name: UPDATE GALLERY LIST 

on:
  push:
    paths:
      - 'images/gallery/**'
  workflow_dispatch:

jobs:
  generate-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: CHECKOUT REPOSITORY
        uses: actions/checkout@v3

      - name: GENERATE IMAGE LIST
        run: |
          # CREATE SCRIPTS FOLDER IF IT DOESN'T EXIST
          mkdir -p scripts
          
          # CREATE THE JAVASCRIPT FILE
          echo "// AUTO-GENERATED - DO NOT EDIT" > scripts/image-list.js
          echo "const galleryImages = [" >> scripts/image-list.js
          
          # LOOP THROUGH ALL IMAGES IN THE GALLERY FOLDER
          # USING FIND INSTEAD OF LS TO CATCH ALL FILES
          find images/gallery -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.gif" -o -iname "*.webp" -o -iname "*.JPG" -o -iname "*.JPEG" -o -iname "*.PNG" -o -iname "*.GIF" -o -iname "*.WEBP" -o -iname "*.heic" -o -iname "*.HEIC" \) -print0 | while IFS= read -r -d '' file; do
            filename=$(basename "$file")
            echo "  '$filename'," >> scripts/image-list.js
            echo "✅ FOUND: $filename"
          done
          
          echo "];" >> scripts/image-list.js
          echo "" >> scripts/image-list.js
          
          # COUNT FILES
          COUNT=$(find images/gallery -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.gif" -o -iname "*.webp" -o -iname "*.JPG" -o -iname "*.JPEG" -o -iname "*.PNG" -o -iname "*.GIF" -o -iname "*.WEBP" -o -iname "*.heic" -o -iname "*.HEIC" \) | wc -l)
          echo "// TOTAL: $COUNT IMAGES" >> scripts/image-list.js
          
          echo "✅ GENERATED LIST WITH $COUNT IMAGES"

      - name: COMMIT AND PUSH
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add scripts/image-list.js
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
          else
            git commit -m "🔄 AUTO-UPDATE GALLERY LIST"
            git push
            echo "✅ Pushed updates!"
          fi